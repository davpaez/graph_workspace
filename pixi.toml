[workspace]
authors = ["David Paez <davpaez@gmail.com>"]
channels = ["conda-forge"]
name = "graph-tech"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
main = 'python scripts/main.py'
test = 'pytest --tb=no tests/'

[dependencies]
python = ">=3.14.4,<3.15"
neo4j-python-driver = ">=6.2.0,<7"
ipykernel = ">=7.2.0,<8"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
neo4j-viz = ">=1.4.0, <2" # For visualizing interactive graphs in notebooks
